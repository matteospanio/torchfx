name: Build wheels

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "CMakeLists.txt"
      - "src/torchfx/_csrc/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest  -> manylinux x86_64
        # macos-14       -> macOS arm64 (Apple Silicon); cross-builds x86_64
        #                   wheels too via CIBW_ARCHS_MACOS below, so we don't
        #                   need GitHub's scarce macos-13 Intel runners.
        # windows-latest -> Windows x86_64
        os: [ubuntu-latest, macos-14, windows-latest]

    env:
      # Resolve `torch` from the CPU index in cibuildwheel's build and test
      # environments. Forwarded into the manylinux container via
      # `environment-pass` in pyproject.toml.
      PIP_INDEX_URL: https://download.pytorch.org/whl/cpu
      PIP_EXTRA_INDEX_URL: https://pypi.org/simple
      # Build both Intel and Apple Silicon wheels from the macos-14 runner.
      # cibuildwheel cross-compiles x86_64 here; its smoke test is auto-skipped
      # for the foreign arch but the wheel itself is valid.
      CIBW_ARCHS_MACOS: "x86_64 arm64"

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    # PyPI trusted publishing: configure the publisher on PyPI to expect
    # this exact (repo, workflow, environment) tuple. The `pypi`
    # environment lives in the repo settings under
    # Settings -> Environments; protection rules (required reviewers,
    # branch/tag filters) can be added there without changing this file.
    environment:
      name: pypi
      url: https://pypi.org/project/torchfx/

    permissions:
      id-token: write  # trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
