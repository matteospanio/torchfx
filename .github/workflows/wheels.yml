name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cpu-wheels:
    name: CPU wheel (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: pip install build

      - name: Install CPU-only PyTorch (build dependency)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build CPU-only wheel
        run: TORCHFX_NO_CUDA=1 python -m build --wheel

      - name: Verify wheel
        run: |
          pip install dist/*.whl
          python -c "import torchfx; assert torchfx.is_native_available(), 'Extension not available'"
          python -c "from torchfx import torchfx_ext; print('Functions:', [x for x in dir(torchfx_ext) if not x.startswith('_')])"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-cpu-${{ matrix.python-version }}
          path: dist/*.whl

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-cpu-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write  # trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
